{% extends "layout.html" %}

{% block title %}{{ action }} Class{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">{{ action }} Class</h1>
        <p class="page-subtitle">{{ action }} class information</p>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label>Class Name <span class="required">*</span></label>
            <input type="text" name="class" value="{{ cls.class if cls else '' }}" placeholder="e.g., 10-A, 9-C"
                required>
        </div>

        <div class="form-group">
            <label>Subject <span class="required">*</span></label>
            <input type="text" name="subject" value="{{ cls.subject if cls else '' }}"
                placeholder="e.g., Mathematics, Physics" required>
        </div>

        <div class="form-group">
            <label>Teacher</label>
            <input type="text" name="teacher" value="{{ cls.teacher if cls else '' }}" placeholder="Teacher name">
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button type="submit" class="btn btn-primary">Save {{ action }}</button>
            <a href="/classes" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
