{% extends "layout.html" %}

{% block title %}{{ action }} Student{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">{{ action }} Student</h1>
        <p class="page-subtitle">{{ action }} student information</p>
    </div>
</div>

<div class="card" style="max-width: 700px;">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>First Name <span class="required">*</span></label>
                <input type="text" name="first_name" value="{{ student.first_name if student else '' }}" required>
            </div>
            <div class="form-group">
                <label>Last Name <span class="required">*</span></label>
                <input type="text" name="last_name" value="{{ student.last_name if student else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" value="{{ student.age if student else '' }}" min="1" max="120">
            </div>
            <div class="form-group">
                <label>Class</label>
                <select name="class">
                    <option value="">Select Class</option>
                    {% for class in classes %}
                    <option value="{{ class.class }}" {% if student and student.class==class.class %}selected{% endif
                        %}>
                        {{ class.class }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email if student else '' }}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" value="{{ student.phone if student else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="Active" {% if student and student.status=='Active' %}selected{% endif %}>Active</option>
                <option value="Inactive" {% if student and student.status=='Inactive' %}selected{% endif %}>Inactive
                </option>
                <option value="Graduated" {% if student and student.status=='Graduated' %}selected{% endif %}>Graduated
                </option>
            </select>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button type="submit" class="btn btn-primary">Save {{ action }}</button>
            <a href="/students" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
