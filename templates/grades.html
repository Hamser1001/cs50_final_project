{% extends "dashboard_layout.html" %}

{% block title %}Grades{% endblock %}

<!-- ─── Main ────────────────────────────────────── -->
<main class="main">
    {% block content %}
    <!-- GRADES PAGE -->
    <div class="page" id="page-grades">
        <div class="page-header">
            <div>
                <h1 class="page-title">Grades</h1>
                <p class="page-subtitle">Student performance by subject.</p>
            </div>
        </div>
        <div class="filter-bar">
            <label>Filter by class:</label>
            <select class="filter-select" id="gradeFilter" onchange="filterGrades()">
                <option value="all">All Classes</option>
                <option value="10-A">Class 10-A</option>
                <option value="10-B">Class 10-B</option>
                <option value="9-C">Class 9-C</option>
                <option value="11-D">Class 11-D</option>
            </select>
        </div>
        <div class="card" style="padding:0">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Class</th>
                            <th>Math</th>
                            <th>Science</th>
                            <th>English</th>
                            <th>History</th>
                            <th>Overall</th>
                        </tr>
                    </thead>
                    <tbody id="gradesBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    {% endblock %}
</main>

<!-- add Students Modal Form -->
<form action="/add_student" method="post">
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Add Student</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input name="first_name" type="text" id="fName" placeholder="e.g. Sara" />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input name="last_name" type="text" id="lName" placeholder="e.g. Mitchell" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input name="age" type="number" id="sAge" placeholder="15" min="5" max="25" />
                    </div>
                    <div class="form-group">
                        <label>Class</label>
                        <select id="sClass" name="class">
                            <option selected disabled>Select option</option>
                            <option>10-A</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="sEmail" placeholder="student@school.edu" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Number Phone</label>
                        <input type="phone" name="number_phone" id="sGpa" placeholder="+212612345678" />
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="sStatus" name="status">
                            <option>Active</option>
                            <option>Inactive</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" onclick="saveStudent()">Save Student</button>
            </div>
        </div>
    </div>
</form>
