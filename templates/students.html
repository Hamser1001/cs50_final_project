{% extends "dashboard_layout.html" %}

{% block title %}Students{% endblock %}

{% block content %}

<!-- STUDENTS PAGE -->
<div class="page active" id="page-students">
    <div class="page-header">
        <div>
            <h1 class="page-title">Students</h1>
            <p class="page-subtitle">Manage all enrolled students.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
            <svg viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Student
        </button>
    </div>
    <div class="card" style="padding:0">
        <div class="table-wrapper">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Class</th>
                        <th>GPA</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <!-- <tbody id="studentsBody"></tbody> -->
                <tbody>
                    <tr>
                        <td>
                            <div class="avatar-name">
                                <div class="name-badge" style="background:#4f46e5">JD</div>
                                John Doe
                            </div>
                        </td>
                        <td>17</td>
                        <td>
                            <span class="class-pill A">10A</span>
                        </td>
                        <td>3.8</td>
                        <td>
                            <span class="class-pill a">Active</span>
                        </td>
                        <td>
                            <div class="actions">
                                <button class="btn-icon edit" title="Edit">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                    </svg>
                                </button>
                                <button class="btn-icon danger" title="Delete">
                                    <svg viewBox="0 0 24 24">
                                        <polyline points="3 6 5 6 21 6" />
                                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                                        <path d="M10 11v6" />
                                        <path d="M14 11v6" />
                                        <path d="M9 6V4h6v2" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ─── Modal ───────────────────────────────────── -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Add Student</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="fName" placeholder="e.g. Sara" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lName" placeholder="e.g. Mitchell" />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="sAge" placeholder="15" min="5" max="25" />
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <select id="sClass">
                        <option>10-A</option>
                        <option>10-B</option>
                        <option>9-C</option>
                        <option>11-D</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="sEmail" placeholder="student@school.edu" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>GPA</label>
                    <input type="number" id="sGpa" placeholder="3.5" step="0.1" min="0" max="4" />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="sStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
        </div>
    </div>
</div>
{% endblock %}
