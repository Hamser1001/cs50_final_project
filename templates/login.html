<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Add Student</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="fName" placeholder="e.g. Sara" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lName" placeholder="e.g. Mitchell" />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="sAge" placeholder="15" min="5" max="25" />
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <select id="sClass">
                        <option>10-A</option>
                        <option>10-B</option>
                        <option>9-C</option>
                        <option>11-D</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="sEmail" placeholder="student@school.edu" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>GPA</label>
                    <input type="number" id="sGpa" placeholder="3.5" step="0.1" min="0" max="4" />
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="sStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
        </div>
    </div>
</body>

</html>
