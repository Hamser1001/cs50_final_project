{% extends "layout.html" %}

{% block title %}Log In{% endblock %}

{% block body %}
<main>
    <form action="/registeration" method="post">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Register</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Username</label>
                    <input name="username" type="text" placeholder="username" required />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input name="first_name" type="text" placeholder="e.g. Sara" required />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input name="last_name" type="text" placeholder="e.g. Mitchell" required />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input name="email" type="email" placeholder="student@school.edu" required />
                    </div>
                    <div class="form-group">
                        <label>Number Phone</label>
                        <input name="number_phone" type="phone" placeholder="+212612345678" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input name="password" type="password" placeholder="********" required />
                </div>
                <div class="form-group">
                    <label>Confirmation</label>
                    <input name="confirmation" type="password" placeholder="********" required />
                </div>
                <div class="auth-footer">
                    Already have an account?
                    <a href="/login">Login</a>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" type="submit">Register</button>
            </div>
        </div>
    </form>
</main>
{% endblock %}
