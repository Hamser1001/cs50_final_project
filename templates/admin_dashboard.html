{% extends "dashboard_layout.html" %}

{% block title %}Dashboard{% endblock %}
{% block content %}

<div class="page active" id="page-dashboard">
    <div class="page-header">
        <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Welcome back — here's what's happening today.</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon green">
                <svg viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </div>
            <div class="stat-value">248</div>
            <div class="stat-label">Total Students</div>
            <div class="stat-delta up">↑ 12 this term</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon amber">
                <svg viewBox="0 0 24 24">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                </svg>
            </div>
            <div class="stat-value">12</div>
            <div class="stat-label">Total Classes</div>
            <div class="stat-delta up">↑ 2 new</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon coral">
                <svg viewBox="0 0 24 24">
                    <polyline points="22 12 18 students12 15 21 9 3 6 12 2 12" />
                </svg>
            </div>
            <div class="stat-value">78.4%</div>
            <div class="stat-label">Average Grade</div>
            <div class="stat-delta down">↓ 1.2% vs last</div>
        </div>
    </div>
</div>


{% endblock %}
