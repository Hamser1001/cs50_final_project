<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Academic Curator | Professional Login</title>
    <link rel="stylesheet" href="static/css/styles.css">


</head>

<body>
    <!-- ─── Topbar ──────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3L2 9v6c0 5.25 4.4 10.15 10 11.35C17.6 25.15 22 20.25 22 15V9L12 3z" />
                    </svg>
                </div>
                <span class="logo-text">SchoolHub</span>
            </div>
        </div>
        <div class="topbar-right">
            <button class="hamburger" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-search">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" placeholder="Search anything…" />
            </div>
            <div class="avatar" title="Admin">AD</div>
            <a class="btn-logout" onclick="showToast('Logged out successfully')">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span>Logout</span>
            </a>
        </div>
    </header>

</body>

</html>
