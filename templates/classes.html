{% extends "dashboard_layout.html" %}

{% block title %}Dashboard{% endblock %}
{% block content %}
<!-- ─── Main ────────────────────────────────────── -->
<main class="main">
    <!-- CLASSES PAGE -->
    <div class="page" id="page-classes">
        <div class="page-header">
            <div>
                <h1 class="page-title">Classes</h1>
                <p class="page-subtitle">Overview of all active classes.</p>
            </div>
            <button class="btn btn-primary" onclick="showToast('New class form coming soon!')">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                New Class
            </button>
        </div>
        <div class="classes-grid" id="classesGrid"></div>
    </div>



</main>

<!-- add Students Modal Form -->
<form action="/add_student" method="post">
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Add Student</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input name="first_name" type="text" id="fName" placeholder="e.g. Sara" />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input name="last_name" type="text" id="lName" placeholder="e.g. Mitchell" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input name="age" type="number" id="sAge" placeholder="15" min="5" max="25" />
                    </div>
                    <div class="form-group">
                        <label>Class</label>
                        <select id="sClass" name="class">
                            <option selected disabled>Select option</option>
                            <option>10-A</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="sEmail" placeholder="student@school.edu" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Number Phone</label>
                        <input type="phone" name="number_phone" id="sGpa" placeholder="+212612345678" />
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="sStatus" name="status">
                            <option>Active</option>
                            <option>Inactive</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" onclick="saveStudent()">Save Student</button>
            </div>
        </div>
    </div>
</form>
{% endblock %}
