<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Academic Curator | Professional Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css' )}}">


</head>

{% body block %}

<body class="bodyBackground">
    {% header block %}
    <header class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3L2 9v6c0 5.25 4.4 10.15 10 11.35C17.6 25.15 22 20.25 22 15V9L12 3z" />
                    </svg>
                </div>
                <span class="logo-text">SchoolHub</span>
            </div>
        </div>
        <div class="topbar-right">

            <a class="btn-user" href="/login">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M12 14c-5 0-8 2-8 3v1h16v-1c0-1-3-3-8-3z" />
                    <path d="M17 11l2 2 4-4" />
                </svg>
                <span>Admins</span>
            </a>
            <a class="btn-user">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <path d="M8 21h8" />
                    <path d="M12 17v4" />
                </svg>
                <span>Teachers</span>
            </a>
            <a class="btn-user">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6" />
                    <path d="M2 10l10-5 10 5-10 5-10-5z" />
                    <path d="M6 12v5c3 3 9 3 12 0v-5" />
                </svg>
                <span>Students</span>
            </a>
        </div>
    </header>
    {% endblock %}
</body>
{% endblock %}

</html>
