<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolHub — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css' )}}">
</head>

<body>
    <main>
        <form action="/register" method="post">
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title" id="modalTitle">Register</span>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Username</label>
                        <input name="username" type="text" placeholder="username" />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input name="first_name" type="text" placeholder="e.g. Sara" />
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input name="last_name" type="text" placeholder="e.g. Mitchell" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input name="email" type="email" placeholder="student@school.edu" />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input name="password" type="password" placeholder="********" />
                    </div>
                    <div class="form-group">
                        <label>Confirmation</label>
                        <input name="confirmation" type="password" placeholder="********" />
                    </div>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" type="submit">Register</button>
                </div>
            </div>
        </form>
    </main>

</body>

</html>
