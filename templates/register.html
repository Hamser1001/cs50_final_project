<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolHub — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css' )}}">
</head>

<body>
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Register</span>

        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="sEmail" placeholder="username" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="fName" placeholder="e.g. Sara" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lName" placeholder="e.g. Mitchell" />
                </div>
            </div>


            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="sEmail" placeholder="student@school.edu" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="********" />
            </div>
            <div class="form-group">
                <label>Confirmation</label>
                <input type="password" placeholder="********" />
            </div>


        </div>
        <div class="modal-footer">
            <button class="btn btn-primary">Register</button>
        </div>
    </div>
</body>

</html>
