<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolHub — Register</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-mark"></div>
                    <span class="logo-text">EduDash</span>
                </div>

                <div class="auth-title">Create account</div>
                <div class="auth-subtitle">Register a new account</div>
            </div>

            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" required>
                </div>

                <label
                    style="font-size:12px; color:var(--muted); display:flex; gap:6px; align-items:center; margin-top:10px;">
                    <input type="checkbox" required>
                    I agree to the terms & conditions
                </label>

                <button class="btn btn-primary" style="width:100%; margin-top:1rem;">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account?
                <a href="login.html">Login</a>
            </div>

        </div>
    </div>

</body>

</html>
